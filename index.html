<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌈 寶貝樂園・100款益智小遊戲</title>
<style>
:root{--bg:#FFF9EC;--ink:#5B4A55;--pink:#FFB5C2;--mint:#A8E6CF;--sun:#FFE29A;--sky:#AEDFF7;--grape:#D5B8F0;--peach:#FFCBA4;--shadow:0 6px 0 rgba(91,74,85,.12)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{font-family:"Yuanti TC","YouYuan","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 12% 8%,rgba(255,181,194,.3),transparent 28%),radial-gradient(circle at 88% 15%,rgba(168,230,207,.3),transparent 28%),radial-gradient(circle at 50% 95%,rgba(213,184,240,.22),transparent 40%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:14px 12px 50px}
header{text-align:center;padding:12px 0 4px}
header h1{font-size:clamp(24px,6.5vw,32px);letter-spacing:1px}
header p{font-size:13px;opacity:.75;margin-top:4px}
.cat{margin-top:20px}
.cat h2{font-size:18px;background:#fff;display:inline-block;padding:6px 16px;border-radius:999px;box-shadow:var(--shadow);margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.gcard{background:#fff;border-radius:18px;padding:12px 6px 10px;text-align:center;box-shadow:var(--shadow);border:3px solid #fff;cursor:pointer;transition:transform .12s;position:relative}
.gcard:active{transform:scale(.93)}
.gcard .emo{font-size:32px;display:block}
.gcard .nm{font-weight:bold;margin-top:5px;font-size:12.5px;line-height:1.3}
.gcard .star{position:absolute;top:4px;right:7px;font-size:11px}
.screen{display:none}
.screen.on{display:block;animation:pop .25s}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1}}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.btn{border:none;font-family:inherit;background:var(--pink);color:#fff;font-weight:bold;font-size:14px;padding:10px 16px;border-radius:999px;box-shadow:0 4px 0 rgba(91,74,85,.18);cursor:pointer}
.btn:active{transform:translateY(3px);box-shadow:none}
.btn.mint{background:var(--mint);color:#3d6b58}
.title{font-size:17px;font-weight:bold;text-align:center;flex:1}
.panel{background:#fff;border-radius:22px;padding:18px 14px;box-shadow:var(--shadow);border:3px solid #fff}
.prog{display:flex;justify-content:center;gap:6px;margin-bottom:12px}
.prog span{width:14px;height:14px;border-radius:50%;background:#EEE2E6}
.prog span.ok{background:var(--mint)}
.prog span.now{background:var(--sun)}
.q{text-align:center;font-size:20px;font-weight:bold;margin-bottom:14px;line-height:1.5}
.stage{background:#FDF6FA;border-radius:18px;padding:16px;text-align:center;font-size:34px;line-height:1.6;letter-spacing:6px;margin-bottom:14px;min-height:70px}
.opts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.opts.two{grid-template-columns:1fr 1fr}
.opts button{padding:14px 6px;font-size:30px;font-weight:bold;border:none;border-radius:18px;background:#fff;box-shadow:0 4px 0 rgba(91,74,85,.15),inset 0 0 0 3px var(--sky);cursor:pointer;color:var(--ink);font-family:inherit}
.opts button:active{transform:translateY(3px);box-shadow:inset 0 0 0 3px var(--sky)}
.opts button.good{background:var(--mint);box-shadow:0 4px 0 rgba(91,74,85,.15),inset 0 0 0 3px #7FC9A8}
.opts button.bad{background:var(--pink);box-shadow:0 4px 0 rgba(91,74,85,.15),inset 0 0 0 3px #F08CA0}
.msg{text-align:center;font-weight:bold;min-height:26px;margin-top:12px;font-size:17px}
.bigstage{display:grid;gap:8px;margin-bottom:8px}
.cell{aspect-ratio:1;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;box-shadow:0 3px 0 rgba(91,74,85,.12)}
.cell.found{background:var(--mint)}
.mcard{aspect-ratio:1;background:var(--grape);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;box-shadow:0 3px 0 rgba(91,74,85,.15)}
.mcard.flip{background:#fff;border:2px solid var(--grape)}
.mcard.done{background:var(--mint);opacity:.9}
.sil{filter:brightness(0) opacity(.75)}
.hole9{aspect-ratio:1;border-radius:50%;background:#EDDCCB;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;cursor:pointer;box-shadow:inset 0 6px 8px rgba(91,74,85,.15)}
.hole9 .mole{font-size:42px;transform:translateY(110%);transition:transform .18s}
.hole9.up .mole{transform:translateY(8%)}
.confetti{position:fixed;top:-10px;font-size:22px;animation:fall linear forwards;z-index:99;pointer-events:none}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg)}}
.winbox{text-align:center;padding:20px 0}
.winbox .big{font-size:64px}
.winbox h3{font-size:24px;margin:10px 0}
.winbox .stars{font-size:36px;letter-spacing:6px}
.sortrow{display:flex;justify-content:center;align-items:flex-end;gap:18px;margin-bottom:14px}
.sortrow div{cursor:pointer;transition:transform .1s}
.sortrow div:active{transform:scale(.9)}
.twoSide{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.side{background:#FDF6FA;border-radius:18px;padding:14px 8px;text-align:center;font-size:26px;line-height:1.5;cursor:pointer;box-shadow:0 4px 0 rgba(91,74,85,.12);min-height:110px}
.side:active{transform:translateY(3px);box-shadow:none}
</style>
</head>
<body>
<div id="app">

<div id="home" class="screen on">
  <header>
    <h1>🌈 寶貝樂園 🎠</h1>
    <p>100 款益智小遊戲・4〜8歲寶貝專屬</p>
  </header>
  <div id="menu"></div>
</div>

<div id="game" class="screen">
  <div class="topbar">
    <button class="btn" onclick="goHome()">🏠</button>
    <div class="title" id="gTitle"></div>
    <button class="btn mint" id="btnRe">🔄</button>
  </div>
  <div class="prog" id="gProg"></div>
  <div class="panel" id="gBody"></div>
  <div class="msg" id="gMsg"></div>
</div>

</div>
<script>
"use strict";
const $=id=>document.getElementById(id);
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
const R=n=>Math.floor(Math.random()*n);
const pick=a=>a[R(a.length)];
let timers=[];
const TO=(f,ms)=>{const t=setTimeout(f,ms);timers.push(t);return t};
const TI=(f,ms)=>{const t=setInterval(f,ms);timers.push(t);return t};
const clearT=()=>{timers.forEach(t=>{clearTimeout(t);clearInterval(t)});timers=[]};
const starBook={}; // 遊戲成績（本次開啟期間）

/* ─── 音效（Web Audio 簡單可愛音）─── */
let AC=null;
function beep(good){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const notes=good?[523,659,784]:[220,180];
    notes.forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type="sine";o.frequency.value=f;
      g.gain.setValueAtTime(.15,AC.currentTime+i*.09);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+i*.09+.18);
      o.connect(g);g.connect(AC.destination);
      o.start(AC.currentTime+i*.09);o.stop(AC.currentTime+i*.09+.2);
    });
  }catch(e){}
}

/* ─── 主題素材 ─── */
const T={
  animals:["🐰","🐻","🐼","🦊","🐷","🐸","🐤","🐱","🐶","🐹"],
  sea:["🐟","🐬","🐙","🦀","🐢","🦈","🐳","🦞","🐚","🦑"],
  fruit:["🍎","🍌","🍓","🍇","🍊","🍉","🍑","🍍","🥝","🍒"],
  bugs:["🐝","🦋","🐞","🐛","🐜","🦗","🕷️","🐌","🪲","🦂"],
  cars:["🚗","🚌","🚑","🚒","🚓","🚜","🚲","🛵","✈️","🚁"],
  sweets:["🍭","🍬","🍩","🧁","🍰","🍪","🍫","🍦","🎂","🍮"],
  weather:["☀️","🌧️","⛅","🌈","❄️","⚡","🌪️","🌙","⭐","☁️"],
  farm:["🐮","🐔","🐑","🐴","🦆","🐐","🐖","🦃","🐇","🫏"],
  toys:["🎈","🧸","🪀","🎁","🪁","🎨","🥁","🎺","🪆","🎯"],
  veg:["🥕","🥦","🌽","🍅","🥬","🥒","🍆","🫑","🧅","🥔"],
};
const TN={animals:"動物",sea:"海洋",fruit:"水果",bugs:"昆蟲",cars:"車車",sweets:"甜點",weather:"天氣",farm:"農場",toys:"玩具",veg:"蔬菜"};
const KEYS=Object.keys(T);

/* ─── 通用回合引擎：5回合，答對過關 ─── */
let state={};
function startGame(g){
  clearT();
  $("home").classList.remove("on");$("game").classList.add("on");
  $("gTitle").textContent=g.emo+" "+g.nm;
  $("gMsg").textContent="";
  $("btnRe").onclick=()=>startGame(g);
  state={g,round:0,total:g.rounds||5,miss:0};
  drawProg();
  g.run();
}
function drawProg(){
  const p=$("gProg");p.innerHTML="";
  for(let i=0;i<state.total;i++){
    const s=document.createElement("span");
    if(i<state.round)s.className="ok";
    else if(i===state.round)s.className="now";
    p.appendChild(s);
  }
}
function goHome(){clearT();$("game").classList.remove("on");$("home").classList.add("on");buildMenu()}
function nextRound(){
  state.round++;drawProg();
  if(state.round>=state.total){finish()}
  else TO(state.g.run,700);
}
function correct(btn){
  beep(true);if(btn)btn.classList.add("good");
  $("gMsg").textContent=pick(["🎉 答對了！","⭐ 好棒！","💖 太厲害了！","🌟 真聰明！"]);
  TO(()=>$("gMsg").textContent="",900);
  nextRound();
}
function wrong(btn){
  beep(false);if(btn)btn.classList.add("bad");state.miss++;
  $("gMsg").textContent=pick(["再試一次！💪","加油加油！🐣","快找到了！🔍"]);
  if(btn)TO(()=>btn.classList.remove("bad"),600);
}
function finish(){
  const stars=state.miss===0?3:state.miss<=2?2:1;
  starBook[state.g.id]=Math.max(starBook[state.g.id]||0,stars);
  $("gBody").innerHTML=`<div class="winbox"><div class="big">🏆</div><h3>全部過關！</h3><div class="stars">${"⭐".repeat(stars)}${"☆".repeat(3-stars)}</div><div style="margin-top:16px"><button class="btn" onclick="goHome()">🏠 選別的遊戲</button> <button class="btn mint" id="wAgain">🔄 再玩一次</button></div></div>`;
  $("wAgain").onclick=()=>startGame(state.g);
  const emos=["🎉","⭐","🍬","💖","🌟","🎈"];
  for(let i=0;i<26;i++){
    const s=document.createElement("span");s.className="confetti";
    s.textContent=pick(emos);s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(1.6+Math.random()*1.6)+"s";
    document.body.appendChild(s);setTimeout(()=>s.remove(),3400);
  }
  beep(true);TO(()=>beep(true),300);
}
function optButtons(opts,answer,fmt){
  const o=document.createElement("div");
  o.className="opts"+(opts.length===2?" two":"");
  opts.forEach(v=>{
    const b=document.createElement("button");
    b.innerHTML=fmt?fmt(v):v;
    b.onclick=()=>{ if(String(v)===String(answer)) correct(b); else wrong(b); };
    o.appendChild(b);
  });
  return o;
}
function numOpts(ans,max){
  const s=new Set([ans]);
  while(s.size<3){const v=Math.max(0,ans+R(5)-2);if(v<=max+2)s.add(v)}
  while(s.size<3)s.add(R(max+3));
  return shuffle([...s]);
}

/* ═══════ 各遊戲機制 ═══════ */

/* 1. 數一數 */
function mkCount(key){return function(){
  const emo=pick(T[key]);const n=1+R(6);
  $("gBody").innerHTML=`<div class="q">數一數，有幾個 ${emo}？</div><div class="stage">${(emo+" ").repeat(n)}</div>`;
  $("gBody").appendChild(optButtons(numOpts(n,7),n));
}}

/* 2. 記憶配對（4對8張，一回合制）*/
function mkMemory(key){return function(){
  state.total=1;drawProg();
  const es=shuffle([...T[key]]).slice(0,4);
  const deck=shuffle([...es,...es]);
  $("gBody").innerHTML=`<div class="q">翻開卡片，找出一樣的！</div><div class="bigstage" style="grid-template-columns:repeat(4,1fr)" id="mm"></div>`;
  let first=null,lock=false,done=0;
  deck.forEach(e=>{
    const c=document.createElement("div");c.className="mcard";c.dataset.e=e;c.textContent="❓";
    c.onclick=()=>{
      if(lock||c.classList.contains("flip")||c.classList.contains("done"))return;
      c.classList.add("flip");c.textContent=e;beep(true);
      if(!first){first=c;return}
      if(first.dataset.e===e){
        first.classList.add("done");c.classList.add("done");
        first.classList.remove("flip");c.classList.remove("flip");
        first=null;done++;
        if(done===4){$("gMsg").textContent="🎉 全部配對成功！";TO(finish,600)}
      }else{
        lock=true;const f=first;first=null;state.miss+=0.5;
        TO(()=>{f.classList.remove("flip");f.textContent="❓";c.classList.remove("flip");c.textContent="❓";lock=false},800);
      }
    };
    $("mm").appendChild(c);
  });
}}

/* 3. 找不一樣 */
function mkOdd(key){return function(){
  const es=shuffle([...T[key]]);const same=es[0],diff=es[1];
  const idx=R(9);
  $("gBody").innerHTML=`<div class="q">哪一個不一樣？點點看！</div><div class="bigstage" style="grid-template-columns:repeat(3,1fr)" id="og"></div>`;
  for(let i=0;i<9;i++){
    const c=document.createElement("div");c.className="cell";
    c.textContent=i===idx?diff:same;
    c.onclick=()=>{ if(i===idx){c.classList.add("found");correct(null)} else wrong(c); };
    $("og").appendChild(c);
  }
}}

/* 4. 影子配對 */
function mkShadow(key){return function(){
  const es=shuffle([...T[key]]).slice(0,3);const ans=es[0];
  $("gBody").innerHTML=`<div class="q">這個黑影是誰呢？</div><div class="stage"><span class="sil" style="font-size:64px">${ans}</span></div>`;
  $("gBody").appendChild(optButtons(shuffle([...es]),ans));
}}

/* 5. 加加看 */
function mkAdd(lvl){return function(){
  const max=lvl<3?5:9;
  const a=1+R(max-1),b=1+R(Math.min(max-a,4)+1);
  const emo=pick(T.fruit);
  $("gBody").innerHTML=`<div class="q">${a} + ${b} = ？</div><div class="stage" style="font-size:26px">${emo.repeat(a)} ➕ ${emo.repeat(b)}</div>`;
  $("gBody").appendChild(optButtons(numOpts(a+b,10),a+b));
}}

/* 6. 減減看 */
function mkSub(lvl){return function(){
  const max=lvl<3?5:9;
  const a=2+R(max-1),b=1+R(a-1);
  const emo=pick(T.sweets);
  $("gBody").innerHTML=`<div class="q">${a} - ${b} = ？</div><div class="stage" style="font-size:26px">${emo.repeat(a-b)}<span style="opacity:.3;text-decoration:line-through">${emo.repeat(b)}</span></div>`;
  $("gBody").appendChild(optButtons(numOpts(a-b,9),a-b));
}}

/* 7. 接下來是什麼（規律）*/
function mkPattern(key,mode){return function(){
  const es=shuffle([...T[key]]).slice(0,3);
  let seq,ans;
  if(mode==="AB"){seq=[es[0],es[1],es[0],es[1]];ans=es[0]}
  else if(mode==="AAB"){seq=[es[0],es[0],es[1],es[0],es[0]];ans=es[1]}
  else{seq=[es[0],es[1],es[2],es[0],es[1]];ans=es[2]}
  $("gBody").innerHTML=`<div class="q">接下來是什麼呢？</div><div class="stage">${seq.join(" ")} <b style="color:#e0719a">❓</b></div>`;
  $("gBody").appendChild(optButtons(shuffle([...es]),ans));
}}

/* 8. 找一找（在格子裡找出全部目標）*/
function mkFind(key){return function(){
  const es=shuffle([...T[key]]);const target=es[0];
  const need=2+R(2); // 2~3個
  const cells=[];
  for(let i=0;i<12;i++)cells.push(pick(es.slice(1,5)));
  const spots=shuffle([...Array(12).keys()]).slice(0,need);
  spots.forEach(i=>cells[i]=target);
  let got=0;
  $("gBody").innerHTML=`<div class="q">找出 ${need} 個 ${target}！</div><div class="bigstage" style="grid-template-columns:repeat(4,1fr)" id="fg"></div>`;
  cells.forEach((e,i)=>{
    const c=document.createElement("div");c.className="cell";c.textContent=e;
    c.onclick=()=>{
      if(c.classList.contains("found"))return;
      if(e===target){c.classList.add("found");beep(true);got++;
        if(got===need)correct(null);
      } else wrong(c);
    };
    $("fg").appendChild(c);
  });
}}

/* 9. 比多少 */
function mkMore(key){return function(){
  const emo=pick(T[key]);
  let a=1+R(6),b=1+R(6);
  if(a===b)b=a<6?b+1:b-1;
  $("gBody").innerHTML=`<div class="q">哪一邊比較多？點點看！</div><div class="twoSide">
    <div class="side" id="sA">${(emo+" ").repeat(a)}</div>
    <div class="side" id="sB">${(emo+" ").repeat(b)}</div></div>`;
  $("sA").onclick=()=>a>b?correct(null):wrong($("sA"));
  $("sB").onclick=()=>b>a?correct(null):wrong($("sB"));
}}

/* 10. 顏色小偵探 */
const COLORSET=[
 ["紅色",["🍎","🍓","🌹","🚒","🍅"]],
 ["黃色",["🍌","🌻","🐤","🧀","⭐"]],
 ["綠色",["🥦","🐸","🍀","🥒","🌵"]],
 ["藍色",["🫐","🐳","💙","🧢","🌊"]],
 ["橘色",["🍊","🥕","🎃","🦊","🏀"]],
];
function mkColor(i){return function(){
  const [cn,goods]=COLORSET[i];
  const others=COLORSET.filter((_,k)=>k!==i).flatMap(c=>c[1]);
  const ans=pick(goods);
  const opts=shuffle([ans,pick(others),pick(others)]);
  $("gBody").innerHTML=`<div class="q">哪一個是「${cn}」的呢？</div>`;
  $("gBody").appendChild(optButtons(opts,ans));
}}

/* 11. 數字排排隊（找出缺少的數字）*/
function mkMissing(lvl){return function(){
  const start=1+R(lvl<3?3:6);
  const seq=[start,start+1,start+2,start+3];
  const hole=R(4);const ans=seq[hole];
  const disp=seq.map((v,i)=>i===hole?"❓":v).join("　");
  $("gBody").innerHTML=`<div class="q">缺少哪個數字呢？</div><div class="stage" style="letter-spacing:2px">${disp}</div>`;
  $("gBody").appendChild(optButtons(numOpts(ans,10),ans));
}}

/* 12. 動動腦分類 */
const QUIZ=[
 {q:"誰住在水裡呢？🌊",good:["🐟","🐬","🐙","🦀","🐳"],bad:["🐰","🐔","🐱","🐶","🦊"]},
 {q:"哪一個是水果呢？🍽️",good:["🍎","🍌","🍇","🍓","🍊"],bad:["🥕","🥦","🌽","🍅","🥬"]},
 {q:"誰會在天上飛呢？☁️",good:["🐦","🦋","🐝","🦅","✈️"],bad:["🐟","🐢","🐷","🚗","🐌"]},
 {q:"哪一個是交通工具呢？🛣️",good:["🚗","🚌","🚲","✈️","🚒"],bad:["🍎","🐶","🌻","🧸","🍰"]},
 {q:"晚上會出現什麼呢？🌃",good:["🌙","⭐","🦉","🌌","🛌"],bad:["☀️","🌈","⛅","🏖️","🌻"]},
];
function mkQuiz(i){return function(){
  const z=QUIZ[i];
  const ans=pick(z.good);
  const set=new Set([ans]);
  while(set.size<3)set.add(pick(z.bad));
  $("gBody").innerHTML=`<div class="q">${z.q}</div>`;
  $("gBody").appendChild(optButtons(shuffle([...set]),ans));
}}

/* 13. 拍拍樂（慢速打地鼠）*/
function mkWhack(key){return function(){
  state.total=1;drawProg();
  const emo=pick(T[key]);
  let sc=0,up=-1,t=20;
  $("gBody").innerHTML=`<div class="q">⏰ <span id="wt">20</span>秒　拍到 <span id="ws">0</span>/8 隻 ${emo}</div><div class="bigstage" style="grid-template-columns:repeat(3,1fr)" id="wg"></div>`;
  for(let i=0;i<9;i++){
    const h=document.createElement("div");h.className="hole9";
    h.innerHTML=`<span class="mole">${emo}</span>`;
    h.onclick=()=>{
      if(i===up){sc++;$("ws").textContent=sc;beep(true);h.classList.remove("up");up=-1;
        if(sc>=8){clearT();$("gMsg").textContent="";finish()}}
    };
    $("wg").appendChild(h);
  }
  const holes=[...document.querySelectorAll(".hole9")];
  TI(()=>{holes.forEach(h=>h.classList.remove("up"));up=R(9);holes[up].classList.add("up")},950);
  TI(()=>{t--;$("wt").textContent=t;
    if(t<=0){clearT();holes.forEach(h=>h.classList.remove("up"));
      if(sc>=8)finish();
      else{state.miss=3;finish()}}},1000);
}}

/* 14. 從小到大 */
function mkSort(key){return function(){
  const emo=pick(T[key]);
  const sizes=shuffle([30,48,68]);
  let expect=0;
  $("gBody").innerHTML=`<div class="q">從「最小」開始，依序點到「最大」！</div><div class="sortrow" id="sr"></div>`;
  const order=[...sizes].sort((a,b)=>a-b);
  sizes.forEach(sz=>{
    const d=document.createElement("div");
    d.style.fontSize=sz+"px";d.textContent=emo;
    d.onclick=()=>{
      if(d.dataset.done)return;
      if(sz===order[expect]){d.style.opacity=".35";d.dataset.done=1;beep(true);expect++;
        if(expect===3)correct(null);
      } else wrong(null);
    };
    $("sr").appendChild(d);
  });
}}

/* ═══════ 首頁選單 ═══════ */
function buildMenu(){
  const m=$("menu");m.innerHTML="";
  const cats={};
  GAMES.forEach(g=>{(cats[g.cat]=cats[g.cat]||[]).push(g)});
  Object.entries(cats).forEach(([cat,list])=>{
    const sec=document.createElement("div");sec.className="cat";
    sec.innerHTML=`<h2>${cat}</h2>`;
    const grid=document.createElement("div");grid.className="grid";
    list.forEach(g=>{
      const d=document.createElement("div");d.className="gcard";
      const st=starBook[g.id]?("⭐".repeat(starBook[g.id])):"";
      d.innerHTML=`<span class="star">${st}</span><span class="emo">${g.emo}</span><div class="nm">${g.no}. ${g.nm}</div>`;
      d.onclick=()=>startGame(g);
      grid.appendChild(d);
    });
    sec.appendChild(grid);
    m.appendChild(sec);
  });
}
buildMenu();

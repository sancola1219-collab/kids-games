<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎓 知識樂園・100款學習遊戲</title>
<style>
:root{--bg:#FFF9EC;--ink:#4A4550;--pink:#FFB5C2;--mint:#A8E6CF;--sun:#FFE29A;--sky:#AEDFF7;--grape:#D5B8F0;--peach:#FFCBA4;--red:#FF8A9B;--shadow:0 6px 0 rgba(74,69,80,.12)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{font-family:"Yuanti TC","YouYuan","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 12% 8%,rgba(255,181,194,.28),transparent 28%),radial-gradient(circle at 88% 12%,rgba(168,230,207,.28),transparent 28%),radial-gradient(circle at 50% 95%,rgba(213,184,240,.2),transparent 40%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:14px 12px 50px}
header{text-align:center;padding:12px 0 4px}
header h1{font-size:clamp(24px,6.5vw,32px);letter-spacing:1px}
header p{font-size:13px;opacity:.75;margin-top:4px}
.cat{margin-top:22px}
.cat h2{font-size:17px;background:#fff;display:inline-block;padding:7px 18px;border-radius:999px;box-shadow:var(--shadow);margin-bottom:12px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.gcard{background:#fff;border-radius:18px;padding:14px 6px 11px;text-align:center;box-shadow:var(--shadow);border:3px solid #fff;cursor:pointer;transition:transform .12s;position:relative}
.gcard:active{transform:scale(.93)}
.gcard .emo{font-size:30px;display:block}
.gcard .nm{font-weight:bold;margin-top:6px;font-size:12.5px;line-height:1.3}
.gcard .star{position:absolute;top:5px;right:8px;font-size:10px}
.screen{display:none}
.screen.on{display:block;animation:pop .25s}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1}}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.btn{border:none;font-family:inherit;background:var(--pink);color:#fff;font-weight:bold;font-size:14px;padding:10px 16px;border-radius:999px;box-shadow:0 4px 0 rgba(74,69,80,.18);cursor:pointer}
.btn:active{transform:translateY(3px);box-shadow:none}
.btn.mint{background:var(--mint);color:#3d6b58}
.title{font-size:16px;font-weight:bold;text-align:center;flex:1}
.panel{background:#fff;border-radius:22px;padding:18px 15px;box-shadow:var(--shadow);border:3px solid #fff}
.prog{display:flex;justify-content:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.prog span{width:13px;height:13px;border-radius:50%;background:#EEE2E6}
.prog span.ok{background:var(--mint)}
.prog span.now{background:var(--sun)}
.prog span.bad{background:var(--red)}
.qnum{text-align:center;font-size:12px;opacity:.6;margin-bottom:6px}
.q{text-align:center;font-size:19px;font-weight:bold;margin-bottom:16px;line-height:1.6}
.q .big{font-size:30px;display:block;margin:8px 0}
.q .en{font-family:Georgia,serif;letter-spacing:.5px}
.opts{display:grid;grid-template-columns:1fr;gap:10px}
.opts.two{grid-template-columns:1fr 1fr}
.opts button{padding:15px 12px;font-size:17px;font-weight:bold;border:none;border-radius:16px;background:#fff;box-shadow:0 4px 0 rgba(74,69,80,.13),inset 0 0 0 3px var(--sky);cursor:pointer;color:var(--ink);font-family:inherit;line-height:1.4;text-align:center}
.opts button:active{transform:translateY(3px);box-shadow:inset 0 0 0 3px var(--sky)}
.opts button.good{background:var(--mint);box-shadow:0 4px 0 rgba(74,69,80,.13),inset 0 0 0 3px #7FC9A8}
.opts button.bad{background:var(--red);color:#fff;box-shadow:0 4px 0 rgba(74,69,80,.13),inset 0 0 0 3px #E86A7D}
.opts button.reveal{background:var(--mint);box-shadow:0 4px 0 rgba(74,69,80,.13),inset 0 0 0 3px #7FC9A8}
.msg{text-align:center;font-weight:bold;min-height:24px;margin-top:14px;font-size:16px}
.expl{background:#FBF6FF;border-radius:14px;padding:12px 14px;margin-top:12px;font-size:14px;line-height:1.6;display:none}
.expl.show{display:block}
.expl b{color:#a065d0}
.winbox{text-align:center;padding:18px 0}
.winbox .big{font-size:60px}
.winbox h3{font-size:22px;margin:10px 0}
.winbox .sc{font-size:16px;opacity:.8;margin-bottom:6px}
.winbox .stars{font-size:34px;letter-spacing:6px;margin:8px 0}
.confetti{position:fixed;top:-10px;font-size:22px;animation:fall linear forwards;z-index:99;pointer-events:none}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg)}}
.next-btn{margin-top:14px;text-align:center}
</style>
</head>
<body>
<div id="app">

<div id="home" class="screen on">
  <header>
    <h1>🎓 知識樂園 📚</h1>
    <p>100 款學習遊戲・國小四〜五年級・六大科目</p>
  </header>
  <div id="menu"></div>
</div>

<div id="game" class="screen">
  <div class="topbar">
    <button class="btn" onclick="goHome()">🏠</button>
    <div class="title" id="gTitle"></div>
    <button class="btn mint" id="btnRe">🔄</button>
  </div>
  <div class="prog" id="gProg"></div>
  <div class="panel" id="gBody"></div>
  <div class="msg" id="gMsg"></div>
</div>

</div>
<script>
"use strict";
const $=id=>document.getElementById(id);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};
const pick=a=>a[Math.floor(Math.random()*a.length)];
const starBook={};

let AC=null;
function beep(good){try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();const notes=good?[523,659,784]:[300,220];notes.forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(.14,AC.currentTime+i*.09);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+i*.09+.18);o.connect(g);g.connect(AC.destination);o.start(AC.currentTime+i*.09);o.stop(AC.currentTime+i*.09+.2)})}catch(e){}}

/* ═══════ 題庫：每款遊戲 = 一組題目 ═══════
   每題格式：{q:題目, o:[選項...], a:正解index, e:解說}
   q 可含 {big:...} 或 {en:...} 由 render 處理，這裡用純文字+標記
*/
const BANK={};

/* ───────── 數學 25 款 ───────── */
BANK.math_mult=["乘法王國","🔢",[
 {q:"12 × 8 = ?",o:["96","86","108","94"],a:0,e:"12×8＝96。可拆成 10×8＋2×8＝80＋16。"},
 {q:"25 × 4 = ?",o:["100","95","90","105"],a:0,e:"25×4＝100，這是常用的湊整組合。"},
 {q:"15 × 6 = ?",o:["90","80","96","85"],a:0,e:"15×6＝90。15×6＝10×6＋5×6＝60＋30。"},
 {q:"7 × 13 = ?",o:["91","81","84","93"],a:0,e:"7×13＝91。7×13＝7×10＋7×3＝70＋21。"},
 {q:"24 × 5 = ?",o:["120","100","110","125"],a:0,e:"24×5＝120。偶數×5＝該數的一半×10。"},
],"進位乘法練習"];

BANK.math_div=["除法探險","➗",[
 {q:"144 ÷ 12 = ?",o:["12","14","11","13"],a:0,e:"12×12＝144，所以 144÷12＝12。"},
 {q:"96 ÷ 8 = ?",o:["12","11","13","14"],a:0,e:"8×12＝96。"},
 {q:"150 ÷ 6 = ?",o:["25","24","26","30"],a:0,e:"6×25＝150。"},
 {q:"84 ÷ 7 = ?",o:["12","13","11","14"],a:0,e:"7×12＝84。"},
 {q:"63 ÷ 9 的餘數是多少？（63÷9）",o:["0","3","6","1"],a:0,e:"9×7＝63，剛好整除，餘數是 0。"},
],"除法與餘數"];

BANK.math_frac=["分數大師","🍰",[
 {q:"1/2 + 1/4 = ?",o:["3/4","2/6","1/6","2/4"],a:0,e:"通分：1/2＝2/4，2/4＋1/4＝3/4。"},
 {q:"3/5 + 1/5 = ?",o:["4/5","4/10","3/10","2/5"],a:0,e:"分母相同，分子相加：3＋1＝4，得 4/5。"},
 {q:"1 - 2/3 = ?",o:["1/3","2/3","1/2","3/3"],a:0,e:"1＝3/3，3/3－2/3＝1/3。"},
 {q:"哪個分數最大？",o:["3/4","1/2","2/5","1/3"],a:0,e:"3/4＝0.75 最大；1/2＝0.5、2/5＝0.4、1/3≈0.33。"},
 {q:"2/6 化成最簡分數是？",o:["1/3","2/3","1/6","2/6"],a:0,e:"分子分母同除以 2：2/6＝1/3。"},
],"分數加減與比較"];

BANK.math_dec=["小數世界","🔟",[
 {q:"0.5 + 0.3 = ?",o:["0.8","0.53","0.35","0.9"],a:0,e:"對齊小數點相加：0.5＋0.3＝0.8。"},
 {q:"1.2 × 3 = ?",o:["3.6","3.2","2.6","4.2"],a:0,e:"1.2×3＝3.6。"},
 {q:"2.5 - 0.7 = ?",o:["1.8","1.7","2.2","1.9"],a:0,e:"2.5－0.7＝1.8。"},
 {q:"0.25 用分數表示是？",o:["1/4","1/2","1/5","2/5"],a:0,e:"0.25＝25/100＝1/4。"},
 {q:"哪個小數最小？",o:["0.09","0.9","0.19","0.91"],a:0,e:"0.09 最小，別被位數騙了。"},
],"小數運算與換算"];

BANK.math_area=["面積周長","📐",[
 {q:"長 6、寬 4 的長方形面積是？",o:["24","20","10","28"],a:0,e:"面積＝長×寬＝6×4＝24。"},
 {q:"邊長 5 的正方形周長是？",o:["20","25","10","15"],a:0,e:"周長＝邊長×4＝5×4＝20。"},
 {q:"長 8、寬 3 的長方形周長是？",o:["22","24","11","16"],a:0,e:"周長＝(長＋寬)×2＝(8＋3)×2＝22。"},
 {q:"邊長 7 的正方形面積是？",o:["49","28","14","56"],a:0,e:"面積＝邊長×邊長＝7×7＝49。"},
 {q:"面積 36、長 9 的長方形，寬是？",o:["4","5","6","3"],a:0,e:"寬＝面積÷長＝36÷9＝4。"},
],"面積與周長公式"];

BANK.math_angle=["角度測量","📐",[
 {q:"直角是幾度？",o:["90°","180°","45°","60°"],a:0,e:"直角＝90 度，像牆角一樣。"},
 {q:"平角（一直線）是幾度？",o:["180°","90°","360°","270°"],a:0,e:"平角＝180 度，是一條直線。"},
 {q:"比直角小的角叫什麼？",o:["銳角","鈍角","平角","周角"],a:0,e:"小於 90 度的是銳角；90~180 度是鈍角。"},
 {q:"時鐘 3 點時，時針與分針夾角？",o:["90°","60°","120°","45°"],a:0,e:"3 點整時針指 3、分針指 12，剛好 90 度。"},
 {q:"三角形三個內角和是？",o:["180°","360°","90°","270°"],a:0,e:"任何三角形內角和都是 180 度。"},
],"角的種類與度數"];

BANK.math_factor=["因數倍數","✖️",[
 {q:"12 的因數不包含下列哪個？",o:["5","3","4","6"],a:0,e:"12 的因數：1,2,3,4,6,12，沒有 5。"},
 {q:"下列哪個是 7 的倍數？",o:["21","25","30","16"],a:0,e:"7×3＝21，是 7 的倍數。"},
 {q:"8 和 12 的最大公因數是？",o:["4","2","6","8"],a:0,e:"8＝2×2×2，12＝2×2×3，公因數最大是 4。"},
 {q:"下列哪個是質數？",o:["13","15","21","9"],a:0,e:"13 只有 1 和自己兩個因數，是質數。"},
 {q:"3 和 4 的最小公倍數是？",o:["12","7","24","6"],a:0,e:"3、6、9、12…與 4、8、12…最先相遇於 12。"},
],"因數、倍數與質數"];

BANK.math_word=["應用題王","📝",[
 {q:"一枝筆 15 元，買 6 枝要多少錢？",o:["90 元","80 元","96 元","75 元"],a:0,e:"15×6＝90 元。"},
 {q:"120 顆糖平分給 8 人，每人幾顆？",o:["15 顆","12 顆","16 顆","14 顆"],a:0,e:"120÷8＝15 顆。"},
 {q:"小明有 250 元，花掉 180 元，剩多少？",o:["70 元","60 元","80 元","75 元"],a:0,e:"250－180＝70 元。"},
 {q:"車子每小時 60 公里，3 小時走多遠？",o:["180 公里","120 公里","200 公里","150 公里"],a:0,e:"速率×時間＝60×3＝180 公里。"},
 {q:"一箱 24 瓶，5 箱共幾瓶？",o:["120 瓶","100 瓶","125 瓶","115 瓶"],a:0,e:"24×5＝120 瓶。"},
],"生活情境應用"];

BANK.math_round=["估算高手","🎯",[
 {q:"387 四捨五入到百位是？",o:["400","300","390","380"],a:0,e:"十位是 8（≥5），進位得 400。"},
 {q:"642 四捨五入到百位是？",o:["600","700","640","650"],a:0,e:"十位是 4（<5），捨去得 600。"},
 {q:"2.7 四捨五入到整數是？",o:["3","2","2.5","3.5"],a:0,e:"小數第一位 7（≥5），進位得 3。"},
 {q:"約 199＋201 最接近哪個數？",o:["400","300","500","350"],a:0,e:"199≈200、201≈200，合計約 400。"},
 {q:"58 × 4 大約是多少？",o:["240","200","280","300"],a:0,e:"58≈60，60×4＝240。"},
],"四捨五入與估算"];

BANK.math_seq=["數列偵探","🔍",[
 {q:"2, 4, 6, 8, ? 下一個？",o:["10","9","12","11"],a:0,e:"每次加 2，8＋2＝10。"},
 {q:"3, 6, 12, 24, ? 下一個？",o:["48","36","30","40"],a:0,e:"每次乘 2，24×2＝48。"},
 {q:"1, 4, 9, 16, ? 下一個？",o:["25","20","24","36"],a:0,e:"這是平方數：5×5＝25。"},
 {q:"100, 90, 80, ? 下一個？",o:["70","75","60","85"],a:0,e:"每次減 10，80－10＝70。"},
 {q:"1, 1, 2, 3, 5, ? 下一個？",o:["8","7","6","10"],a:0,e:"費氏數列：前兩數相加，3＋5＝8。"},
],"找出數列規律"];

BANK.math_time=["時間計算","⏰",[
 {q:"1 小時 30 分 ＝ 幾分鐘？",o:["90 分","70 分","120 分","80 分"],a:0,e:"60＋30＝90 分鐘。"},
 {q:"從 9:20 到 10:05 經過多久？",o:["45 分","40 分","50 分","35 分"],a:0,e:"9:20 到 10:20 是 60 分，往回 15 分＝45 分。"},
 {q:"2 天 ＝ 幾小時？",o:["48 小時","24 小時","36 小時","72 小時"],a:0,e:"一天 24 小時，2×24＝48。"},
 {q:"180 秒 ＝ 幾分鐘？",o:["3 分","2 分","4 分","5 分"],a:0,e:"180÷60＝3 分鐘。"},
 {q:"下午 3 點用 24 小時制是？",o:["15:00","13:00","03:00","14:00"],a:0,e:"下午時間＋12，3＋12＝15:00。"},
],"時間單位與計算"];

BANK.math_money=["理財小達人","💰",[
 {q:"買 68 元的東西付 100 元，找多少？",o:["32 元","42 元","38 元","28 元"],a:0,e:"100－68＝32 元。"},
 {q:"3 個 45 元的麵包共多少錢？",o:["135 元","120 元","145 元","150 元"],a:0,e:"45×3＝135 元。"},
 {q:"打 8 折後 200 元的衣服要付？",o:["160 元","180 元","150 元","140 元"],a:0,e:"8 折＝×0.8，200×0.8＝160 元。"},
 {q:"存 50 元，每週再存 20 元，3 週後共？",o:["110 元","100 元","120 元","90 元"],a:0,e:"50＋20×3＝50＋60＝110 元。"},
 {q:"買一送一，2 杯 60 元，平均一杯？",o:["30 元","60 元","20 元","40 元"],a:0,e:"60÷2＝30 元。"},
],"金錢與折扣"];

BANK.math_vol=["體積容量","🧊",[
 {q:"長寬高各 2 的正方體體積是？",o:["8","6","4","12"],a:0,e:"體積＝長×寬×高＝2×2×2＝8。"},
 {q:"1 公升 ＝ 幾毫升(ml)？",o:["1000","100","10","10000"],a:0,e:"1 公升＝1000 毫升。"},
 {q:"長 3、寬 2、高 4 的箱子體積？",o:["24","20","18","9"],a:0,e:"3×2×4＝24 立方單位。"},
 {q:"2 公升 ＝ 幾毫升？",o:["2000","200","20","2500"],a:0,e:"2×1000＝2000 毫升。"},
 {q:"500ml 的兩瓶水共幾公升？",o:["1 公升","2 公升","0.5 公升","5 公升"],a:0,e:"500×2＝1000ml＝1 公升。"},
],"體積與容量單位"];

BANK.math_neg=["溫度數線","🌡️",[
 {q:"氣溫從 5°C 降 8°C，變成幾度？",o:["-3°C","3°C","-8°C","13°C"],a:0,e:"5－8＝－3，零下 3 度。"},
 {q:"-2 和 3 之間相差幾度？",o:["5","1","2","3"],a:0,e:"從 －2 到 3 要走 5 格。"},
 {q:"下列哪個數最小？",o:["-5","-1","0","2"],a:0,e:"負數越大越小，－5 最小。"},
 {q:"-3 + 5 = ?",o:["2","-2","8","-8"],a:0,e:"從 －3 往右走 5 格到 2。"},
 {q:"海拔 -10 公尺代表？",o:["海平面下10公尺","海平面上10公尺","剛好海平面","10公里深"],a:0,e:"負號代表低於海平面。"},
],"負數與數線"];

BANK.math_ratio=["比與比例","⚖️",[
 {q:"2:3 中，若前項是 4，後項是？",o:["6","5","9","8"],a:0,e:"2:3＝4:6，兩項都乘 2。"},
 {q:"男生女生 3:2，共 20 人，男生幾人？",o:["12","10","8","15"],a:0,e:"3＋2＝5 份，20÷5＝4，男生 3×4＝12。"},
 {q:"1:4 的比，化成分數是？",o:["1/4","1/5","4/1","1/3"],a:0,e:"1 比 4 就是 1/4。"},
 {q:"果汁 水＝1:3，3 杯果汁配幾杯水？",o:["9 杯","3 杯","6 杯","12 杯"],a:0,e:"水是果汁的 3 倍，3×3＝9。"},
 {q:"6:8 化成最簡比是？",o:["3:4","2:3","1:2","4:5"],a:0,e:"同除以 2：6:8＝3:4。"},
],"比例的基本概念"];

BANK.math_data=["圖表判讀","📊",[
 {q:"長條圖最適合表示什麼？",o:["各項數量比較","連續變化趨勢","占整體比例","位置分布"],a:0,e:"長條圖用高低比較各類數量。"},
 {q:"圓餅圖最適合表示？",o:["各部分占整體的比例","時間趨勢","地理位置","溫度"],a:0,e:"圓餅圖顯示部分與整體的比例。"},
 {q:"折線圖最適合表示？",o:["隨時間的變化","占比","分類數量","無關資料"],a:0,e:"折線圖看趨勢與變化最清楚。"},

 {q:"電腦的發明主要幫助人們？",o:["快速計算與處理資訊","種田","煮飯","睡覺"],a:0,e:"電腦大幅提升計算與資訊處理能力。"},
 {q:"火車最初用什麼當動力？",o:["蒸汽","電","太陽能","風"],a:0,e:"早期火車以燒煤產生蒸汽驅動。"},
],"改變世界的發明"];

BANK.his_museum=["文物古蹟","🏛️",[
 {q:"古蹟需要我們？",o:["保護與維護","拆掉","塗鴉","破壞"],a:0,e:"古蹟是歷史見證，應妥善保存。"},
 {q:"博物館的功能是？",o:["收藏與展示文物","賣玩具","放電影","賣菜"],a:0,e:"博物館保存並展示歷史文物供人學習。"},
 {q:"參觀古蹟時應該？",o:["不亂觸摸、不破壞","隨意攀爬","刻名字","丟垃圾"],a:0,e:"愛護古蹟，遵守參觀規定。"},
 {q:"文物對我們的意義是？",o:["了解祖先的生活","沒有用","只是舊東西","占空間"],a:0,e:"文物幫助我們認識過去的文化。"},
 {q:"下列哪個是台灣著名古蹟？",o:["赤崁樓","巴黎鐵塔","自由女神","金字塔"],a:0,e:"赤崁樓在台南，是荷治時期的古蹟。"},
],"文化資產"];

/* ═══════ 建立遊戲清單 ═══════ */
const SUBJECTS={
  math:{name:"🔢 數學（25款）",order:1},
  sci:{name:"🔬 自然（20款）",order:2},
  en:{name:"🔤 英文（16款）",order:3},
  ch:{name:"📖 國文（16款）",order:4},
  geo:{name:"🌍 地理（12款）",order:5},
  his:{name:"🏛️ 歷史（11款）",order:6},
};
const GAMES=[];
let no=1;
for(const key in BANK){
  const sub=key.split("_")[0];
  const [nm,emo,questions,desc]=BANK[key];
  GAMES.push({id:key,no:no++,sub,nm,emo,questions,desc});
}

/* ═══════ 遊戲執行 ═══════ */
let state={};
function startGame(g){
  $("home").classList.remove("on");$("game").classList.add("on");
  $("gTitle").textContent=g.emo+" "+g.nm;
  $("gMsg").textContent="";
  $("btnRe").onclick=()=>startGame(g);
  state={g,idx:0,correct:0,answered:false,results:[]};
  drawProg();
  showQ();
}
function drawProg(){
  const p=$("gProg");p.innerHTML="";
  state.g.questions.forEach((_,i)=>{
    const s=document.createElement("span");
    if(state.results[i]==="ok")s.className="ok";
    else if(state.results[i]==="bad")s.className="bad";
    else if(i===state.idx)s.className="now";
    p.appendChild(s);
  });
}
function goHome(){$("game").classList.remove("on");$("home").classList.add("on");buildMenu()}
function showQ(){
  const g=state.g,item=g.questions[state.idx];
  state.answered=false;
  let qhtml=item.q;
  // 英文題目中的英文字加樣式
  const body=`<div class="qnum">第 ${state.idx+1} / ${g.questions.length} 題</div><div class="q">${qhtml}</div><div class="opts" id="opts"></div><div class="expl" id="expl"></div>`;
  $("gBody").innerHTML=body;
  const optsEl=$("opts");
  const optionData=item.o.map((text,i)=>({text,i}));
  const shown=shuffle(optionData);
  if(item.o.length===2)optsEl.classList.add("two");
  shown.forEach(od=>{
    const b=document.createElement("button");
    b.textContent=od.text;
    b.onclick=()=>answer(od.i,b,item);
    optsEl.appendChild(b);
  });
  drawProg();
}
function answer(chosen,btn,item){
  if(state.answered)return;
  state.answered=true;
  const correct=chosen===item.a;
  const buttons=[...$("opts").children];
  if(correct){
    beep(true);btn.classList.add("good");
    state.correct++;state.results[state.idx]="ok";
    $("gMsg").textContent=pick(["🎉 答對了！","⭐ 很棒！","💯 正確！","🌟 太厲害了！"]);
  }else{
    beep(false);btn.classList.add("bad");
    state.results[state.idx]="bad";
    // 標出正解
    buttons.forEach(b=>{if(b.textContent===item.o[item.a])b.classList.add("reveal")});
    $("gMsg").textContent="再看看正確答案 👇";
  }
  buttons.forEach(b=>b.onclick=null);
  // 顯示解說
  const ex=$("expl");
  ex.innerHTML=`<b>💡 說明：</b>${item.e}`;
  ex.classList.add("show");
  // 下一題按鈕
  const nx=document.createElement("div");
  nx.className="next-btn";
  const isLast=state.idx>=state.g.questions.length-1;
  nx.innerHTML=`<button class="btn mint">${isLast?"看成績 🏆":"下一題 ➡️"}</button>`;
  nx.querySelector("button").onclick=()=>{
    if(isLast)finish();
    else{state.idx++;$("gMsg").textContent="";showQ()}
  };
  $("gBody").appendChild(nx);
  drawProg();
}
function finish(){
  const total=state.g.questions.length,sc=state.correct;
  const stars=sc===total?3:sc>=Math.ceil(total*0.6)?2:1;
  starBook[state.g.id]=Math.max(starBook[state.g.id]||0,stars);
  $("gMsg").textContent="";
  $("gBody").innerHTML=`<div class="winbox"><div class="big">${stars===3?"🏆":stars===2?"🎉":"💪"}</div><h3>${stars===3?"全部答對！滿分！":stars===2?"表現很好！":"完成挑戰！"}</h3><div class="sc">答對 ${sc} / ${total} 題</div><div class="stars">${"⭐".repeat(stars)}${"☆".repeat(3-stars)}</div><div style="margin-top:16px"><button class="btn" onclick="goHome()">🏠 選別的</button> <button class="btn mint" id="again">🔄 再玩一次</button></div></div>`;
  $("again").onclick=()=>startGame(state.g);
  if(stars>=2){
    const emos=["🎉","⭐","📚","💯","🌟","🎓"];
    for(let i=0;i<26;i++){
      const s=document.createElement("span");s.className="confetti";
      s.textContent=pick(emos);s.style.left=Math.random()*100+"vw";
      s.style.animationDuration=(1.6+Math.random()*1.6)+"s";
      document.body.appendChild(s);setTimeout(()=>s.remove(),3400);
    }
  }
  beep(true);
}

/* ═══════ 首頁選單 ═══════ */
function buildMenu(){
  const m=$("menu");m.innerHTML="";
  const bySub={};
  GAMES.forEach(g=>{(bySub[g.sub]=bySub[g.sub]||[]).push(g)});
  Object.keys(SUBJECTS).sort((a,b)=>SUBJECTS[a].order-SUBJECTS[b].order).forEach(sub=>{
    const list=bySub[sub];if(!list)return;
    const sec=document.createElement("div");sec.className="cat";
    sec.innerHTML=`<h2>${SUBJECTS[sub].name}</h2>`;
    const grid=document.createElement("div");grid.className="grid";
    list.forEach(g=>{
      const d=document.createElement("div");d.className="gcard";
      const st=starBook[g.id]?("⭐".repeat(starBook[g.id])):"";
      d.innerHTML=`<span class="star">${st}</span><span class="emo">${g.emo}</span><div class="nm">${g.nm}</div>`;
      d.onclick=()=>startGame(g);
      grid.appendChild(d);
    });
    sec.appendChild(grid);
    m.appendChild(sec);
  });
}
buildMenu();
</script>
